name: Price Sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (sirf prices print karo, kuch likho mat)"
        type: boolean
        default: false
  schedule:
    - cron: "0 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Run price sync
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          cat > sync.mjs << 'SCRIPT_EOF'
          // Signora Jewels — Ring Price Sync (embedded, zero dependencies)
          // Same formula as sync-prices.js v2 (Manufacturing Cost Report model)

          const STORE = process.env.SHOPIFY_STORE;
          const TOKEN = process.env.SHOPIFY_TOKEN;
          const API_VERSION = '2025-07';
          const DRY_RUN = process.env.DRY_RUN === 'true';

          // Every product carrying this tag gets auto-priced. No code edits to add products.
          const PRICE_TAG = 'auto-price';

          function karatKey(metalValue) {
            const v = String(metalValue).toLowerCase();
            if (v.includes('9k'))  return '9k';
            if (v.includes('10k')) return '10k';
            if (v.includes('14k')) return '14k';
            if (v.includes('18k')) return '18k';
            if (v.includes('22k')) return '22k';
            return null;
          }
          function isSilver(metalValue) {
            const v = String(metalValue).toLowerCase();
            return v.includes('silver') || v.includes('925') || v.includes('999');
          }
          function caratRateKey(carat) {
            return 'diamond_usd_' + carat.toFixed(1).replace('.', '_');
          }
          function caratOf(caratValue) {
            const m = String(caratValue).match(/[\d.]+/);
            return m ? parseFloat(m[0]) : null;
          }

          if (!STORE || !TOKEN) {
            console.error('Missing SHOPIFY_STORE or SHOPIFY_TOKEN secret.');
            process.exit(1);
          }
          const ENDPOINT = `https://${STORE}/admin/api/${API_VERSION}/graphql.json`;

          async function gql(query, variables = {}) {
            const res = await fetch(ENDPOINT, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'X-Shopify-Access-Token': TOKEN },
              body: JSON.stringify({ query, variables }),
            });
            const json = await res.json();
            if (json.errors) throw new Error('GraphQL error: ' + JSON.stringify(json.errors, null, 2));
            return json.data;
          }

          async function getRates() {
            const data = await gql(`
              query {
                metaobjectByHandle(handle: {type: "signora_pricing_rates", handle: "default"}) {
                  fields { key value }
                }
              }`);
            if (!data.metaobjectByHandle) throw new Error('signora_pricing_rates metaobject not found.');
            const f = {};
            data.metaobjectByHandle.fields.forEach((x) => (f[x.key] = parseFloat(x.value)));
            return f;
          }

          async function getHandlesByTag(tag) {
            const handles = [];
            let after = null;
            do {
              const data = await gql(`
                query($q: String!, $after: String) {
                  products(first: 50, query: $q, after: $after) {
                    edges { node { handle } }
                    pageInfo { hasNextPage endCursor }
                  }
                }`, { q: 'tag:' + tag, after });
              data.products.edges.forEach((e) => handles.push(e.node.handle));
              after = data.products.pageInfo.hasNextPage ? data.products.pageInfo.endCursor : null;
            } while (after);
            return handles;
          }

          async function getProduct(handle) {
            const data = await gql(`
              query($handle: String!) {
                productByHandle(handle: $handle) {
                  id title
                  markup: metafield(namespace: "sjw", key: "markup_multiplier") { value }
                  weights: metafield(namespace: "sjw", key: "metal_weights") { value }
                  side: metafield(namespace: "sjw", key: "side_diamond_ct") { value }
                  variants(first: 250) {
                    edges { node { id selectedOptions { name value } } }
                  }
                }
              }`, { handle });
            return data.productByHandle;
          }

          function computeUsd(rates, alloyG, metalVal, carat, markup, sideCt) {
            const dRate = rates[caratRateKey(carat)];
            if (dRate == null) return null;
            let metalInr;
            if (isSilver(metalVal)) {
              const touch = (rates.touch_silver != null) ? rates.touch_silver : 92.5;  // sterling 925
              if (rates.silver_rate_inr == null) return null;
              metalInr = alloyG * (touch / 100) * rates.silver_rate_inr;
            } else {
              const touch = rates['touch_' + karatKey(metalVal)];
              if (touch == null || rates.gold_24k_rate_inr == null) return null;
              metalInr = alloyG * (touch / 100) * rates.gold_24k_rate_inr;
            }
            const diamondInr = (carat + (sideCt || 0)) * dRate * rates.usd_to_inr;  // center + fixed halo/side carat
            const laborInr   = (metalInr + diamondInr) * (rates.labor_pct / 100);
            const totalCost  = metalInr + diamondInr + laborInr;
            const listingInr = totalCost * markup;
            const usd        = listingInr / rates.usd_to_inr;
            return Math.round(usd);  // round off to nearest whole dollar
          }

          async function updatePrices(productId, updates) {
            const MUT = `
              mutation($productId: ID!, $variants: [ProductVariantsBulkInput!]!) {
                productVariantsBulkUpdate(productId: $productId, variants: $variants) {
                  userErrors { field message }
                }
              }`;
            for (let i = 0; i < updates.length; i += 100) {
              const batch = updates.slice(i, i + 100);
              const data = await gql(MUT, { productId, variants: batch });
              const errs = data.productVariantsBulkUpdate.userErrors;
              if (errs.length) console.error('  ! Update errors:', JSON.stringify(errs));
            }
          }

          (async () => {
            console.log(DRY_RUN ? '== DRY RUN (no changes written) ==' : '== LIVE SYNC ==');
            const rates = await getRates();

            const handles = await getHandlesByTag(PRICE_TAG);
            console.log(`Found ${handles.length} product(s) tagged "${PRICE_TAG}".`);

            for (const handle of handles) {
              const p = await getProduct(handle);
              if (!p) { console.warn(`\nSKIP: not found: ${handle}`); continue; }

              const markup = p.markup ? parseFloat(p.markup.value) : null;
              const sideCt = p.side ? (parseFloat(p.side.value) || 0) : 0;
              let weights = {};
              try { weights = p.weights ? JSON.parse(p.weights.value) : {}; } catch (e) { weights = {}; }

              console.log(`\n${p.title}`);
              if (markup == null) { console.warn('  ! No sjw.markup_multiplier set — skipping.'); continue; }
              if (!Object.keys(weights).length) { console.warn('  ! No sjw.metal_weights JSON set — skipping.'); continue; }

              const updates = [];
              for (const { node } of p.variants.edges) {
                const opts = {};
                node.selectedOptions.forEach((o) => (opts[o.name.toLowerCase()] = o.value));
                const metalVal = opts['metal type - color & purity'] || opts['metal'] || Object.values(opts)[0];
                const caratVal = opts['carat'] || Object.values(opts)[1];

                const carat = caratOf(caratVal || '');
                const alloyG = weights[metalVal];
                const silver = isSilver(metalVal || '');
                if (!silver && !karatKey(metalVal || '')) { console.warn(`  ? karat? "${metalVal}" — skipped`); continue; }
                if (carat == null)  { console.warn(`  ? carat? "${caratVal}" — skipped`); continue; }
                if (alloyG == null) { console.warn(`  ? no weight for "${metalVal}" in metal_weights — skipped`); continue; }

                const mUp = silver ? (rates.markup_silver != null ? rates.markup_silver : markup) : markup;
                const usd = computeUsd(rates, alloyG, metalVal, carat, mUp, sideCt);
                if (usd == null) { console.warn(`  ? missing rate for ${metalVal}/${carat}ct — skipped`); continue; }
                updates.push({ id: node.id, price: usd.toFixed(2) });
                console.log(`  ${metalVal} / ${carat}ct  ->  $${usd.toFixed(2)}`);
              }

              if (!DRY_RUN && updates.length) {
                await updatePrices(p.id, updates);
                console.log(`  Updated ${updates.length} variants.`);
              } else {
                console.log(`  ${updates.length} variants computed (dry run — not written).`);
              }
            }
            console.log('\nDone.');
          })().catch((e) => { console.error(e.message || e); process.exit(1); });
          SCRIPT_EOF
          node sync.mjs
